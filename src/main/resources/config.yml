# armorstandtools config
# text supports minimessage formatting: https://docs.advntr.dev/minimessage/format.html
# placeholders in a string are written as {placeholder}

settings:
  # <name> = armor stand's name, <prefix> = same prefix used in chat (messages.prefix)
  gui-title: "<prefix><name>"
  # used in the menu title when the armor stand has no custom name
  default-armorstand-name: "Armor Stand"
  # max distance (blocks) the player can move away from the stand while free-editing
  max-free-edit-distance: 15
  # max scale without the armorstandtools.unlimitedsize permission
  default-size-limit: 4
  # max scale with the armorstandtools.unlimitedsize permission
  unlimited-size-limit: 16
  # grace period (ticks) after closing free-edit before interactions get cancelled again
  free-edit-timeout-ticks: 5

messages:
  prefix: "<gradient:#00c6ff:#0072ff><bold>[Editor]</bold></gradient> "
  # plain color name or hex code, not a minimessage tag - only colors text with no color yet
  default-color: "#FFD166"
  success-color: "#06D6A0"
  error-color: "#EF476F"

  active: "<gradient:#56ab2f:#a8e063><bold>ACTIVE</bold></gradient>"
  inactive: "<gradient:#eb3349:#f45c43><bold>INACTIVE</bold></gradient>"

  baseplate-toggled: "Baseplate is now <status>"
  arms-toggled: "Arms are now <status>"
  small-toggled: "Small is now <status>"
  unmoveable-toggled: "Immovable is now <status>"
  invisible-toggled: "Invisible is now <status>"
  name-visible-toggled: "Name visibility is now <status>"

  free-edit-activated: "Free edit mode activated."
  free-edit-instruction: "Move around to change the armor stand."
  free-edit-confirm: "Left-click to confirm."
  free-edit-cancelled: "Armor stand editing cancelled."
  free-edit-ended: "Free edit mode ended."

  no-build-permission: "No build permission!"

  # {axis} = x/X, y/Y, z/Z, {value} = formatted number, {unit} = "°" or ""
  format-axis: "{axis} = {value}{unit}"
  # {label} = "yaw" or "Yaw", {value} = formatted number
  format-yaw: "{label} = {value}°"
  format-scale-item: "Size = {value}"
  format-scale-chat: "Scale = {value}"

  # lore on the value-display items, telling the player what a click resets it to
  lore-reset-zero: "Click to set to 0."
  lore-reset-one: "Click to set to 1."

  # {value} includes its own unit/sign
  format-shift-lore: "Shift+Click: {value}"

# each entry under items: can have material (bukkit material name), name/lore (minimessage),
# and glint (true/false, makes it glow without a real enchantment)
